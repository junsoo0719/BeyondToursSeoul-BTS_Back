spring:
  application:
    name: bts

  threads:
    virtual:
      enabled: true

  datasource:
    url: ${SUPABASE_DB_URL}
    driver-class-name: org.postgresql.Driver
    username: ${SUPABASE_DB_USERNAME}
    password: ${SUPABASE_DB_PASSWORD}

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
    # SHOW_SQL 환경변수가 있으면 그 값을, 없으면 기본값인 true 사용
    show-sql: ${SHOW_SQL:true}
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${SUPABASE_JWT_ISSUER}
          jwk-set-uri: ${SUPABASE_JWT_JWKS_URI}
          jws-algorithms: ES256

  config:
    import: optional:file:.env[.properties] # .env파일에서 환경변수 로드

  cache:
    type: caffeine
    caffeine:
      spec: expireAfterWrite=2h
    # 작성된지 2시간 후 자동 삭제로 임의 설정 (시간은 h, m, s 단위 사용하가능)
server:
  address: 0.0.0.0
  port: ${PORT:8080}
  # JSON AI 챗 등 POST 본문이 길어질 때 Tomcat 413 방지(기본 2MB 근처에서 걸리는 환경 대비)
  tomcat:
    max-http-form-post-size: 10MB

frontend:
  allowed-origins: ${FRONTEND_ALLOWED_ORIGINS}

logging:
  level:
    # LOG_SQL_LEVEL 환경변수가 있으면 그 값을, 없으면 기본값인 debug/trace 사용
    org.hibernate.SQL: ${LOG_SQL_LEVEL:debug}
    org.hibernate.type.descriptor.sql: ${LOG_SQL_LEVEL:trace}

seoul:
  open-api:
    key: ${SEOUL_OPEN_API_KEY}

google:
  translation:
    api:
      key: ${GOOGLE_TRANSLATION_API_KEY}

groq:
  api:
    key: ${GROQ_API_KEY:}
    base-url: ${GROQ_API_BASE_URL:https://api.groq.com/openai/v1}
    model: ${GROQ_MODEL:llama-3.1-8b-instant}
    # 무료/온디맨드 TPM: 입력+max 출력 예약. 단일 Groq 호출이므로 .env에서 토큰·RAG 상한 조정 권장
    max-completion-tokens: ${GROQ_MAX_COMPLETION_TOKENS:800}
    # RAG 검색 결과 상한(일수×6건 등). Groq 입력은 rag-document-cap으로 한 번 더 자름
    rag-document-cap: ${GROQ_RAG_DOCUMENT_CAP:22}
    # 프롬프트 토큰 절약(전체 candidateArray·후처리는 유지, LLM에 보내는 문자열만 제한)
    prompt-max-candidates: ${GROQ_PROMPT_MAX_CANDIDATES:28}
    prompt-max-history-messages: ${GROQ_PROMPT_MAX_HISTORY_MESSAGES:6}
    prompt-max-history-chars: ${GROQ_PROMPT_MAX_HISTORY_CHARS:380}
    prompt-max-user-chars: ${GROQ_PROMPT_MAX_USER_CHARS:2600}
    prompt-max-places: ${GROQ_PROMPT_MAX_PLACES:4}
    prompt-max-place-info-chars: ${GROQ_PROMPT_MAX_PLACE_INFO_CHARS:48}

rag:
  search:
    min-local-score: ${RAG_MIN_LOCAL_SCORE:0.35}
    local-first-ordering: ${RAG_LOCAL_FIRST_ORDERING:true}

visit:
  seoul:
    api:
      key: ${VISIT_SEOUL_API_KEY}

# 공공데이터 포털 API 키
public:
  data:
    api:
      key: ${PUBLIC_DATA_API_KEY}

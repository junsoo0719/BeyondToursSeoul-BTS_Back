spring:
  application:
    name: bts

  datasource:
    url: ${SUPABASE_DB_URL}
    driver-class-name: org.postgresql.Driver
    username: ${SUPABASE_DB_USERNAME}
    password: ${SUPABASE_DB_PASSWORD}

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${SUPABASE_JWT_ISSUER}
          jwk-set-uri: ${SUPABASE_JWT_JWKS_URI}
          jws-algorithms: ES256

  config:
    import: optional:file:.env[.properties] # .env파일에서 환경변수 로드

  cache:
    type: caffeine
    caffeine:
      spec: expireAfterWrite=2h
    # 작성된지 2시간 후 자동 삭제로 임의 설정 (시간은 h, m, s 단위 사용하가능)
server:
  address: 0.0.0.0
  port: ${PORT:8080}

frontend:
  allowed-origins: ${FRONTEND_ALLOWED_ORIGINS}

logging:
  level:
    org.hibernate.SQL: debug
    org.hibernate.type.descriptor.sql: trace

seoul:
  open-api:
    key: ${SEOUL_OPEN_API_KEY}

google:
  translation:
    api:
      key: ${GOOGLE_TRANSLATION_API_KEY}

groq:
  api:
    key: ${GROQ_API_KEY:}
    base-url: ${GROQ_API_BASE_URL:https://api.groq.com/openai/v1}
    model: ${GROQ_MODEL:llama-3.1-8b-instant}
    fallback-model: ${GROQ_FALLBACK_MODEL:}

rag:
  search:
    min-local-score: ${RAG_MIN_LOCAL_SCORE:0.35}
    local-first-ordering: ${RAG_LOCAL_FIRST_ORDERING:true}

visit:
  seoul:
    api:
      key: ${VISIT_SEOUL_API_KEY}

# 공공데이터 포털 API 키
public:
  data:
    api:
      key: ${PUBLIC_DATA_API_KEY}